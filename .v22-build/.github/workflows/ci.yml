name: CI

on:
  push:
    branches: [master, dav]
    paths:
      - 'firmware/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'firmware/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-pio-

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build ROM0 (default flash slot)
        run: pio run -e rom0
        working-directory: firmware

      - name: Build ROM1 (OTA update slot)
        run: pio run -e rom1
        working-directory: firmware

      - name: Build flash images (strip eboot from firmware)
        run: python prepare_flash.py both
        working-directory: firmware

      - name: Upload firmware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-binaries
          path: |
            firmware/.pio/build/*/firmware.bin
            firmware/flash_images/*.bin
          retention-days: 7
          if-no-files-found: warn
